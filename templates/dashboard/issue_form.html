{% extends 'base.html' %}
{% block title %}{{ title }} - SEO Insight Pro{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'seo_audit' %}" class="text-sm text-indigo-600 hover:underline flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Audit
        </a>
        <h1 class="font-h2 text-h2 text-on-surface mt-2">{{ title }}</h1>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Severity</label>
                {{ form.severity }}
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Title *</label>
                {{ form.title }}
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Description</label>
                {{ form.description }}
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Category</label>
                    {{ form.category }}
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Icon (Material Symbol)</label>
                    {{ form.icon }}
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'seo_audit' %}" class="px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm font-semibold hover:bg-gray-50">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">
                    Add Issue
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
